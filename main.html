<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3. Multi-step Form Wizard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 40px; }
    .container { max-width: 700px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
    .progress { display: flex; background: #eee; }
    .step { flex: 1; padding: 15px; text-align: center; background: #3498db; color: white; transition: 0.3s; }
    .step.inactive { background: #ddd; color: #666; }
    .form-step { padding: 30px; display: none; }
    .form-step.active { display: block; }
    input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 12px 25px; margin: 10px 5px; border: none; border-radius: 6px; cursor: pointer; }
    .btn-next { background: #27ae60; color: white; }
    .btn-prev { background: #95a5a6; color: white; }
    .error { color: red; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="progress" id="progress">
      <div class="step active" data-step="1">1. Shaxsiy</div>
      <div class="step" data-step="2">2. Manzil</div>
      <div class="step" data-step="3">3. To'lov</div>
      <div class="step" data-step="4">4. Tasdiqlash</div>
    </div>

    <form id="multiForm">
      <!-- Step 1 -->
      <div class="form-step active" id="step1">
        <h2>Shaxsiy ma'lumotlar</h2>
        <input type="text" id="name" placeholder="To'liq ism" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="phone" placeholder="Telefon" required>
      </div>

      <!-- Step 2 -->
      <div class="form-step" id="step2">
        <h2>Manzil</h2>
        <input type="text" id="address" placeholder="Manzil" required>
        <input type="text" id="city" placeholder="Shahar" required>
        <select id="country" required>
          <option value="">Davlatni tanlang</option>
          <option value="UZ">O'zbekiston</option>
          <option value="RU">Rossiya</option>
          <option value="TR">Turkiya</option>
        </select>
      </div>

      <!-- Step 3 -->
      <div class="form-step" id="step3">
        <h2>To'lov ma'lumotlari</h2>
        <input type="text" id="card" placeholder="Karta raqami" maxlength="16" required>
        <input type="text" id="expiry" placeholder="MM/YY" required>
        <input type="text" id="cvv" placeholder="CVV" maxlength="3" required>
      </div>

      <!-- Step 4 -->
      <div class="form-step" id="step4">
        <h2>Tasdiqlash</h2>
        <p><strong>Ism:</strong> <span id="confirm-name"></span></p>
        <p><strong>Email:</strong> <span id="confirm-email"></span></p>
        <p><strong>Manzil:</strong> <span id="confirm-address"></span></p>
      </div>
    </form>

    <div style="padding: 20px; text-align: right;">
      <button class="btn-prev" id="prevBtn" onclick="prevStep()">Orqaga</button>
      <button class="btn-next" id="nextBtn" onclick="nextStep()">Oldinga</button>
    </div>
  </div>

  <script>
    let currentStep = 1;
    const totalSteps = 4;

    function showStep(step) {
      document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
      document.getElementById(`step${step}`).classList.add('active');

      document.querySelectorAll('.step').forEach(s => {
        s.classList.toggle('active', parseInt(s.dataset.step) <= step);
      });

      document.getElementById('prevBtn').style.display = step === 1 ? 'none' : 'inline-block';
      document.getElementById('nextBtn').textContent = step === totalSteps ? 'Yuborish' : 'Oldinga';
    }

    function nextStep() {
      if (currentStep < totalSteps) {
        currentStep++;
        showStep(currentStep);
        if (currentStep === totalSteps) updateSummary();
      } else {
        alert("Forma muvaffaqiyatli yuborildi! ✅");
      }
    }

    function prevStep() {
      if (currentStep > 1) {
        currentStep--;
        showStep(currentStep);
      }
    }

    function updateSummary() {
      document.getElementById('confirm-name').textContent = document.getElementById('name').value;
      document.getElementById('confirm-email').textContent = document.getElementById('email').value;
      document.getElementById('confirm-address').textContent = 
        `${document.getElementById('address').value}, ${document.getElementById('city').value}`;
    }

    // Boshlang'ich
    showStep(1);
  </script>
</body>
</html>
